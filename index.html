<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Asientos · Graduación 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F1EA; --ink: #1A1714; --gold: #C4973A; --red: #A32D2D; --orange: #C45A1A; --green: #2D6A4F; --border: rgba(26,23,20,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }
  .app { max-width: 680px; margin: 0 auto; padding: 20px 16px 80px; }
  .screen { display: none; } .screen.active { display: block; }
  .card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 22px; margin-bottom: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
  .my-card { background: var(--ink); color: #fff; border-radius: 16px; padding: 22px; margin-bottom: 16px; position: relative; }
  .name-row { font-family: 'DM Serif Display', serif; font-size: 24px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; text-align: center; }
  .label { font-size: 10px; text-transform: uppercase; opacity: 0.6; display: block; margin-bottom: 4px; }
  .value { font-size: 22px; font-weight: 600; }
  .mail-btn { background: none; border: none; font-size: 24px; cursor: pointer; position: relative; color: white; }
  .notif-dot { position: absolute; top: -5px; right: -5px; background: var(--orange); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid var(--ink); }
  .btn { display: inline-flex; align-items: center; justify-content: center; padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); background: #fff; width: 100%; font-family: inherit; transition: 0.2s; }
  .btn-gold { background: var(--gold); color: #fff; border: none; }
  .btn-red { background: #fee2e2; color: var(--red); border: 1px solid #fecaca; }
  .form-input { width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid var(--border); margin-bottom: 15px; font-family: inherit; font-size: 15px; }
  .offer-card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
  .modal-overlay.active { display: flex; }
  .modal { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--ink); color: #fff; padding: 10px 22px; border-radius: 30px; transition: 0.3s; z-index: 3000; font-size: 13px; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app">
  <div id="s-login" class="screen active">
    <div class="card" style="max-width:400px; margin: 40px auto; text-align: center;">
      <h2 style="font-family:'DM Serif Display'; margin-bottom: 20px;">Graduación 2026</h2>
      <input class="form-input" id="l-email" type="email" placeholder="Correo electrónico">
      <button class="btn btn-gold" onclick="doLogin()">Iniciar Sesión</button>
      <button class="btn" style="margin-top:10px; border:none;" onclick="goTo('s-register')">¿No tienes cuenta? Regístrate</button>
    </div>
  </div>

  <div id="s-register" class="screen">
    <div class="card">
      <h3 style="margin-bottom:15px">Registrar Usuario</h3>
      <input class="form-input" id="r-name" type="text" placeholder="Nombre y Apellidos">
      <input class="form-input" id="r-email" type="email" placeholder="Correo electrónico">
      <input class="form-input" id="r-total" type="number" value="4" placeholder="Invitados totales">
      <button class="btn btn-gold" onclick="doRegister()">Registrar</button>
      <button class="btn" style="margin-top:10px" onclick="goTo('s-login')">Volver</button>
    </div>
  </div>

  <div id="s-setup" class="screen">
    <div class="card">
      <h3 id="setup-title" style="margin-bottom:20px">Configurar Asientos</h3>
      <div class="form-group" id="group-name-edit" style="display:none; margin-bottom:20px;">
        <label class="label" style="color:var(--ink)">Tu nombre</label>
        <input class="form-input" id="e-name" type="text">
      </div>
      <div class="form-group">
        <p style="font-size:14px; margin-bottom:10px">¿Cuántos invitados se sientan en <b>1ª FILA</b>?</p>
        <p style="font-size:12px; color:var(--ink-muted); margin-bottom:15px">Máximo permitido por tus huecos actuales: <span id="e-max-label">4</span></p>
        <input type="range" id="e-slider" style="width:100%; accent-color:var(--gold);" oninput="document.getElementById('e-slider-val').innerText=this.value">
        <h1 id="e-slider-val" style="text-align:center; color:var(--gold); margin:10px 0;">4</h1>
      </div>
      <button class="btn btn-gold" onclick="saveConfig()">Guardar Configuración</button>
      <hr id="delete-hr" style="margin:25px 0; border:0; border-top:1px solid var(--border); display:none;">
      <button id="delete-btn" class="btn btn-red" onclick="deleteAccount()" style="display:none;">⚠️ Borrar mi cuenta</button>
    </div>
  </div>

  <div id="s-main" class="screen">
    <div class="my-card">
      <div class="name-row">
        <span id="mc-name">—</span>
        <button class="mail-btn" onclick="openNotifs()">
          ✉️<div id="mail-notif" class="notif-dot" style="display:none">!</div>
        </button>
      </div>
      <div class="stats-grid">
        <div class="stat-item"><span class="label">Invitados</span><div class="value" id="mc-total">0</div></div>
        <div class="stat-item"><span class="label">En 1ª Fila</span><div class="value" id="mc-front">0</div></div>
      </div>
      <div style="display:flex; gap:10px;">
        <button class="btn" style="background:rgba(255,255,255,0.1); color:white; border:none;" onclick="openEdit()">Ajustes</button>
        <button class="btn" style="background:rgba(255,255,255,0.1); color:white; border:none;" onclick="logout()">Salir</button>
      </div>
    </div>
    <h4 style="margin: 20px 0 10px; font-size: 11px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 1px;">Intercambios Disponibles</h4>
    <div id="tab-offers"></div>
  </div>

  <div id="s-notifs" class="screen">
    <div class="card">
      <h3 style="margin-bottom:15px">Notificaciones</h3>
      <div id="notif-list"></div>
      <button class="btn" style="margin-top:15px" onclick="goTo('s-main')">Atrás</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-req">
  <div class="modal">
    <h3 style="margin-bottom:10px">Pedir huecos</h3>
    <p id="req-text" style="font-size:13px; color:var(--ink-muted); margin-bottom:15px;"></p>
    <input type="number" id="modal-qty" class="form-input" min="1" value="1">
    <div style="display:flex; gap:10px;">
      <button class="btn" onclick="document.getElementById('modal-req').classList.remove('active')">Cancelar</button>
      <button class="btn btn-gold" onclick="sendRequest()">Enviar Pedido</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const BASE_URL = "https://graduacion2026-1faf3-default-rtdb.firebaseio.com";
  let currentUser = null;
  let targetAlumno = null;

  function goTo(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 's-main') { renderMain(); checkNotifs(); }
  }

  function showToast(m) { const t = document.getElementById('toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

  async function doRegister() {
    const email = document.getElementById('r-email').value.toLowerCase().replace(/\./g, '_');
    const name = document.getElementById('r-name').value.trim();
    const total = parseInt(document.getElementById('r-total').value);
    if(!name || !email) return alert("Faltan datos");
    
    // Crear usuario con configured: false para forzar setup al entrar
    const nuevo = { nombre: name, email: email, invitadosTotales: total, front: 4, capacidad: 4, configured: false };
    await fetch(`${BASE_URL}/alumnos/${email}.json`, { method: 'PUT', body: JSON.stringify(nuevo) });
    showToast("¡Registrado! Inicia sesión ahora.");
    goTo('s-login');
  }

  async function doLogin() {
    const email = document.getElementById('l-email').value.toLowerCase().replace(/\./g, '_');
    const r = await fetch(`${BASE_URL}/alumnos/${email}.json`);
    const u = await r.json();
    if(!u) return alert("Usuario no encontrado");
    currentUser = u;
    if(!u.configured) openFirstSetup();
    else goTo('s-main');
  }

  function openFirstSetup() {
    document.getElementById('setup-title').innerText = "Bienvenido, configura tus asientos";
    document.getElementById('group-name-edit').style.display = "none";
    document.getElementById('delete-btn').style.display = "none";
    document.getElementById('delete-hr').style.display = "none";
    prepareSlider();
    goTo('s-setup');
  }

  function openEdit() {
    document.getElementById('setup-title').innerText = "Ajustes de Perfil";
    document.getElementById('group-name-edit').style.display = "block";
    document.getElementById('delete-btn').style.display = "block";
    document.getElementById('delete-hr').style.display = "block";
    document.getElementById('e-name').value = currentUser.nombre;
    prepareSlider();
    goTo('s-setup');
  }

  function prepareSlider() {
    document.getElementById('e-max-label').innerText = currentUser.capacidad;
    document.getElementById('e-slider').max = currentUser.capacidad;
    document.getElementById('e-slider').value = currentUser.front;
    document.getElementById('e-slider-val').innerText = currentUser.front;
  }

  async function saveConfig() {
    const newFront = parseInt(document.getElementById('e-slider').value);
    const newName = document.getElementById('e-name').value.trim() || currentUser.nombre;
    
    if (newFront > currentUser.invitadosTotales) return alert("No puedes ocupar más asientos que invitados traes");

    await fetch(`${BASE_URL}/alumnos/${currentUser.email}.json`, { 
      method: 'PATCH', 
      body: JSON.stringify({ front: newFront, nombre: newName, configured: true }) 
    });
    
    showToast("Configuración guardada");
    doLogin(); // Recargar datos frescos
  }

  async function renderMain() {
    const r = await fetch(`${BASE_URL}/alumnos/${currentUser.email}.json`);
    currentUser = await r.json();
    document.getElementById('mc-name').innerText = currentUser.nombre;
    document.getElementById('mc-total').innerText = currentUser.invitadosTotales;
    document.getElementById('mc-front').innerText = currentUser.front;

    const r2 = await fetch(`${BASE_URL}/alumnos.json`);
    const todos = await r2.json() || {};
    const cont = document.getElementById('tab-offers');
    cont.innerHTML = "";
    Object.values(todos).forEach(a => {
      const libres = a.capacidad - a.front;
      if(a.email !== currentUser.email && libres > 0) {
        const div = document.createElement('div');
        div.className="offer-card";
        div.innerHTML = `<div><b>${a.nombre}</b><br><small style="color:gray">${libres} huecos libres</small></div><button class="btn btn-gold" style="width:auto; padding:6px 15px;" onclick="openRequest('${a.email}', '${a.nombre}', ${libres})">Pedir</button>`;
        cont.appendChild(div);
      }
    });
  }

  function openRequest(email, nombre, max) {
    targetAlumno = email;
    document.getElementById('req-text').innerText = `${nombre} ofrece ${max} huecos. ¿Cuántos quieres?`;
    document.getElementById('modal-qty').max = max;
    document.getElementById('modal-qty').value = 1;
    document.getElementById('modal-req').classList.add('active');
  }

  async function sendRequest() {
    const qty = parseInt(document.getElementById('modal-qty').value);
    if(qty > parseInt(document.getElementById('modal-qty').max) || qty < 1) return alert("Cantidad inválida");
    const sol = { desde: currentUser.nombre, desdeEmail: currentUser.email, cantidad: qty };
    await fetch(`${BASE_URL}/solicitudes/${targetAlumno}/${currentUser.email}.json`, { method: 'PUT', body: JSON.stringify(sol) });
    document.getElementById('modal-req').classList.remove('active');
    showToast("Solicitud enviada");
  }

  async function checkNotifs() {
    const r = await fetch(`${BASE_URL}/solicitudes/${currentUser.email}.json`);
    const data = await r.json();
    document.getElementById('mail-notif').style.display = data ? 'flex' : 'none';
  }

  async function openNotifs() {
    goTo('s-notifs');
    const r = await fetch(`${BASE_URL}/solicitudes/${currentUser.email}.json`);
    const data = await r.json();
    const list = document.getElementById('notif-list');
    list.innerHTML = data ? "" : "<p style='text-align:center; color:gray; padding:20px;'>No tienes solicitudes.</p>";
    if(data) {
      Object.values(data).forEach(s => {
        const d = document.createElement('div');
        d.className = "card";
        d.innerHTML = `<p><b>${s.desde}</b> solicita ${s.cantidad} huecos.</p>
        <div style="display:flex; gap:10px; margin-top:15px;">
          <button class="btn btn-gold" onclick="handleSol('${s.desdeEmail}', ${s.cantidad}, 'aceptar')">Aceptar</button>
          <button class="btn" style="color:var(--red)" onclick="handleSol('${s.desdeEmail}', null, 'rechazar')">Rechazar</button>
        </div>`;
        list.appendChild(d);
      });
    }
  }

  async function handleSol(solicitanteEmail, cantidad, accion) {
    if(accion === 'aceptar') {
      // 1. Quitar de mi capacidad (yo los doy)
      const nuevaCapYo = currentUser.capacidad - cantidad;
      const nuevoFrontYo = Math.min(currentUser.front, nuevaCapYo);
      await fetch(`${BASE_URL}/alumnos/${currentUser.email}.json`, { method: 'PATCH', body: JSON.stringify({ capacidad: nuevaCapYo, front: nuevoFrontYo }) });

      // 2. Aumentar capacidad Y 'EN 1ª FILA' del otro (él los recibe y ocupa)
      const r = await fetch(`${BASE_URL}/alumnos/${solicitanteEmail}.json`);
      const otro = await r.json();
      const nuevaCapOtro = otro.capacidad + cantidad;
      const nuevoFrontOtro = otro.front + cantidad; // SE SUMAN AUTOMÁTICAMENTE A SU VARIABLE 'EN 1ª FILA'
      await fetch(`${BASE_URL}/alumnos/${solicitanteEmail}.json`, { method: 'PATCH', body: JSON.stringify({ capacidad: nuevaCapOtro, front: nuevoFrontOtro }) });
    }
    await fetch(`${BASE_URL}/solicitudes/${currentUser.email}/${solicitanteEmail}.json`, { method: 'DELETE' });
    showToast(accion === 'aceptar' ? "Intercambio realizado" : "Rechazada");
    openNotifs();
  }

  async function deleteAccount() {
    if(!confirm("¿Borrar cuenta? Perderás tus datos.")) return;
    await fetch(`${BASE_URL}/alumnos/${currentUser.email}.json`, { method: 'DELETE' });
    await fetch(`${BASE_URL}/solicitudes/${currentUser.email}.json`, { method: 'DELETE' });
    logout();
  }

  function logout() { currentUser = null; goTo('s-login'); }
</script>
</body>
</html>
