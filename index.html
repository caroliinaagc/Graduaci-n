<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Asientos · Graduación 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F1EA; --ink: #1A1714; --gold: #C4973A; --red: #A32D2D; --orange: #C45A1A; --border: rgba(26,23,20,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }
  .app { max-width: 680px; margin: 0 auto; padding: 20px 16px 80px; }
  .screen { display: none; } .screen.active { display: block; }
  .card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 22px; margin-bottom: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
  .my-card { background: var(--ink); color: #fff; border-radius: 16px; padding: 22px; margin-bottom: 16px; position: relative; }
  .name-row { font-family: 'DM Serif Display', serif; font-size: 24px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; text-align: center; }
  .label { font-size: 10px; text-transform: uppercase; opacity: 0.6; display: block; margin-bottom: 4px; }
  .value { font-size: 22px; font-weight: 600; }
  .btn { display: inline-flex; align-items: center; justify-content: center; padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); background: #fff; width: 100%; font-family: inherit; transition: 0.2s; text-decoration: none; }
  .btn-gold { background: var(--gold); color: #fff; border: none; }
  .form-group { margin-bottom: 15px; text-align: left; }
  .form-label { font-size: 13px; font-weight: 600; color: var(--ink-soft); display: block; margin-bottom: 6px; }
  .form-input { width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid var(--border); margin-bottom: 5px; font-family: inherit; font-size: 15px; }

  /* --- ESTILO DEL SLIDER --- */
  .slider-container { padding: 20px 0; text-align: center; }
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 12px;
    background: #e0dacc;
    border-radius: 10px;
    outline: none;
    margin: 25px 0;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 30px; height: 30px; background: var(--gold);
    cursor: pointer; border-radius: 50%; border: 4px solid white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  input[type=range]::-moz-range-thumb {
    width: 30px; height: 30px; background: var(--gold);
    cursor: pointer; border-radius: 50%; border: 4px solid white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .big-number { font-size: 64px; font-weight: bold; color: var(--gold); line-height: 1; }
  .mail-btn { background: none; border: none; font-size: 24px; cursor: pointer; position: relative; color: white; }
  .notif-dot { position: absolute; top: -5px; right: -5px; background: var(--orange); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid var(--ink); }
  .offer-card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--ink); color: #fff; padding: 10px 22px; border-radius: 30px; transition: 0.3s; z-index: 3000; font-size: 13px; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app">
  <div id="s-login" class="screen active">
    <div class="card" style="max-width:400px; margin: 40px auto; text-align: center;">
      <h2 style="font-family:'DM Serif Display'; margin-bottom: 20px;">Graduación 2026</h2>
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input class="form-input" id="l-email" type="email" placeholder="tu@correo.com">
      </div>
      <button class="btn btn-gold" onclick="doLogin()">Iniciar Sesión</button>
      <button class="btn" style="margin-top:10px; border:none;" onclick="goTo('s-register')">¿No tienes cuenta? Regístrate</button>
    </div>
  </div>

  <div id="s-register" class="screen">
    <div class="card">
      <h3 style="margin-bottom:20px">Registrar Usuario</h3>
      
      <div class="form-group">
        <label class="form-label">Nombre y Apellidos</label>
        <input class="form-input" id="r-name" type="text" placeholder="Ej. Juan Pérez">
      </div>

      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input class="form-input" id="r-email" type="email" placeholder="correo@ejemplo.com">
      </div>

      <div class="form-group">
        <label class="form-label">Número de invitados</label>
        <input class="form-input" id="r-total" type="number" value="4">
      </div>

      <button class="btn btn-gold" onclick="doRegister()">Registrar</button>
      <button class="btn" style="margin-top:10px" onclick="goTo('s-login')">Volver</button>
    </div>
  </div>

  <div id="s-setup" class="screen">
    <div class="card">
      <h3 id="setup-title" style="margin-bottom:20px; text-align:center;">Configurar Asientos</h3>
      
      <div class="slider-container">
        <p style="font-size:15px;">¿Cuántos invitados van en <b>1ª FILA</b>?</p>
        <p style="font-size:12px; color:var(--ink-muted);">Límite máximo permitido: <span id="e-max-label">4</span></p>
        
        <input type="range" id="e-slider" min="0" max="4" value="0" step="1" oninput="updateSliderUI(this.value)">
        
        <div class="big-number" id="e-slider-val">0</div>
        <p style="color:var(--gold); font-weight:600; margin-top:5px;">asientos</p>
      </div>

      <button class="btn btn-gold" onclick="saveConfig()">Confirmar Asientos</button>
    </div>
  </div>

  <div id="s-main" class="screen">
    <div class="my-card">
      <div class="name-row">
        <span id="mc-name">—</span>
        <button class="mail-btn" onclick="openNotifs()">
          ✉️<div id="mail-notif" class="notif-dot" style="display:none">!</div>
        </button>
      </div>
      <div class="stats-grid">
        <div class="stat-item"><span class="label">Total Invitados</span><div class="value" id="mc-total">0</div></div>
        <div class="stat-item"><span class="label">En 1ª Fila</span><div class="value" id="mc-front">0</div></div>
      </div>
      <div style="display:flex; gap:10px;">
        <button class="btn" style="background:rgba(255,255,255,0.1); color:white; border:none;" onclick="openEdit()">Ajustes</button>
        <button class="btn" style="background:rgba(255,255,255,0.1); color:white; border:none;" onclick="logout()">Salir</button>
      </div>
    </div>
    <div id="tab-offers"></div>
  </div>

  <div id="s-notifs" class="screen">
    <div class="card">
      <h3 style="margin-bottom:15px">Notificaciones</h3>
      <div id="notif-list"></div>
      <button class="btn" onclick="goTo('s-main')">Volver</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // Tu URL de Firebase
  const BASE_URL = "https://graduacion2026-1faf3-default-rtdb.firebaseio.com/alumnos";

  let currentUser = null;

  function goTo(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 's-main') { renderMain(); checkNotifs(); }
  }

  function showToast(m) { const t = document.getElementById('toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

  function updateSliderUI(val) { document.getElementById('e-slider-val').innerText = val; }

  async function doRegister() {
    const email = document.getElementById('r-email').value.toLowerCase().replace(/\./g, '_');
    const name = document.getElementById('r-name').value.trim();
    const total = parseInt(document.getElementById('r-total').value);
    if(!name || !email || isNaN(total)) return alert("Faltan datos");
    
    const nuevo = { nombre: name, email: email, invitadosTotales: total, front: 0, capacidad: 4, configured: false };
    await fetch(`${BASE_URL}/${email}.json`, { method: 'PUT', body: JSON.stringify(nuevo) });
    showToast("¡Registro completado!");
    goTo('s-login');
  }

  async function doLogin() {
    const email = document.getElementById('l-email').value.toLowerCase().replace(/\./g, '_');
    const r = await fetch(`${BASE_URL}/${email}.json`);
    const u = await r.json();
    if(!u) return alert("Usuario no encontrado");
    currentUser = u;
    
    if(!u.configured) {
        const slider = document.getElementById('e-slider');
        const maxReal = Math.min(currentUser.capacidad, currentUser.invitadosTotales);
        slider.max = maxReal;
        document.getElementById('e-max-label').innerText = maxReal;
        slider.value = maxReal;
        updateSliderUI(maxReal);
        goTo('s-setup');
    } else {
        goTo('s-main');
    }
  }

  async function saveConfig() {
    const newFront = parseInt(document.getElementById('e-slider').value);
    await fetch(`${BASE_URL}/${currentUser.email}.json`, { 
      method: 'PATCH', body: JSON.stringify({ front: newFront, configured: true }) 
    });
    showToast("Configuración guardada");
    goTo('s-main');
  }

  async function renderMain() {
    const r = await fetch(`${BASE_URL}/${currentUser.email}.json`);
    currentUser = await r.json();
    document.getElementById('mc-name').innerText = currentUser.nombre;
    document.getElementById('mc-total').innerText = currentUser.invitadosTotales;
    document.getElementById('mc-front').innerText = currentUser.front;

    const r2 = await fetch(`${BASE_URL}.json`);
    const todos = await r2.json() || {};
    const cont = document.getElementById('tab-offers');
    cont.innerHTML = "<h4 style='font-size:11px; color:gray; margin-bottom:10px;'>HUECOS DISPONIBLES</h4>";
    Object.values(todos).forEach(a => {
      const libres = a.capacidad - a.front;
      if(a.email !== currentUser.email && libres > 0) {
        const div = document.createElement('div');
        div.className="offer-card";
        div.innerHTML = `<div><b>${a.nombre}</b><br><small style="color:gray">${libres} libres</small></div><button class="btn btn-gold" style="width:auto; padding:6px 15px;" onclick="alert('Solicitud enviada')">Pedir</button>`;
        cont.appendChild(div);
      }
    });
  }

  async function checkNotifs() {
    const r = await fetch(`https://graduacion2026-1faf3-default-rtdb.firebaseio.com/solicitudes/${currentUser.email}.json`);
    const data = await r.json();
    document.getElementById('mail-notif').style.display = data ? 'flex' : 'none';
  }

  function logout() { currentUser = null; goTo('s-login'); }
</script>
</body>
</html>
