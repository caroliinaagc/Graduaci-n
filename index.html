<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Asientos · Graduación 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F1EA; --cream-dark: #EAE4D8; --ink: #1A1714; --ink-soft: #4A453F;
    --ink-muted: #8A847C; --gold: #C4973A; --gold-light: #F0E4C4; --green: #2D6A4F;
    --green-light: #D8EDDF; --orange: #C45A1A; --orange-light: #FAE3D2; --red: #A32D2D;
    --red-light: #FADEDC; --border: rgba(26,23,20,0.12); --border-strong: rgba(26,23,20,0.25);
    --shadow: 0 2px 12px rgba(26,23,20,0.08); --shadow-lg: 0 8px 32px rgba(26,23,20,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; font-size: 15px; }
  .app { max-width: 680px; margin: 0 auto; padding: 0 16px 80px; }
  .header { padding: 32px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
  .header-pre { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 4px; }
  .header-title { font-family: 'DM Serif Display', serif; font-size: 28px; line-height: 1.2; }
  .header-sub { font-size: 13px; color: var(--ink-muted); margin-top: 4px; }
  .screen { display: none; }
  .screen.active { display: block; }
  .card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 20px 22px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .my-card { background: var(--ink); color: #fff; border-radius: 16px; padding: 22px 24px; margin-bottom: 16px; position: relative; overflow: hidden; }
  .my-card .label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.55; margin-bottom: 2px; }
  .my-card .value { font-size: 18px; font-weight: 600; }
  .my-card .name-row { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
  .offer-card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; margin-bottom: 10px; }
  .offer-row { display: flex; align-items: center; gap: 12px; }
  .avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border-strong); background: #fff; transition: all 0.15s; }
  .btn-primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn-gold { background: var(--gold); color: #fff; border-color: var(--gold); }
  .btn-outline-white { background: transparent; color: #fff; border-color: rgba(255,255,255,0.3); font-size: 11px; padding: 6px 12px; }
  .btn-full { width: 100%; margin-bottom: 10px; }
  .form-group { margin-bottom: 15px; }
  .form-label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 5px; }
  .form-input { width: 100%; padding: 11px; border-radius: 10px; border: 1.5px solid var(--border-strong); font-family: inherit; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--ink); color: #fff; padding: 10px 20px; border-radius: 20px; transition: 0.3s; z-index: 1000; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-pre">Acto de graduación</div>
    <div class="header-title">Gestión de Asientos</div>
    <div class="header-sub">Curso 2025–2026</div>
  </div>

  <div id="s-login" class="screen active">
    <div class="card" style="max-width:400px;margin:0 auto">
      <p style="font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:4px">Iniciar Sesión</p>
      <p style="font-size:13px;color:var(--ink-muted);margin-bottom:20px">Accede a tu cuenta</p>
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input class="form-input" id="l-email" type="email" placeholder="tu@correo.com" />
      </div>
      <div id="l-error" style="color:var(--red);font-size:12px;margin-bottom:12px;display:none"></div>
      <button class="btn btn-primary btn-full" onclick="doLogin()">Entrar →</button>
      <hr style="border:0; border-top:1px solid var(--border); margin:15px 0;">
      <button class="btn btn-full" onclick="goTo('s-register')">Registrar nuevo usuario</button>
    </div>
  </div>

  <div id="s-register" class="screen">
    <div class="card" style="max-width:400px;margin:0 auto">
      <p style="font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:4px">Crear Usuario</p>
      <div class="form-group">
        <label class="form-label">Nombre y Apellidos</label>
        <input class="form-input" id="r-name" type="text" placeholder="Ej. Ana García López" />
      </div>
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input class="form-input" id="r-email" type="email" placeholder="ana@correo.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Número total de invitados</label>
        <input class="form-input" id="r-total" type="number" min="1" value="4" />
      </div>
      <div id="r-error" style="color:var(--red);font-size:12px;margin-bottom:12px;display:none"></div>
      <button class="btn btn-gold btn-full" onclick="doRegister()">Registrar y volver</button>
      <button class="btn btn-full" onclick="goTo('s-login')">Cancelar</button>
    </div>
  </div>

  <div id="s-setup" class="screen">
    <p style="font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:4px">Ajustar Asientos</p>
    <div class="card">
      <p style="font-weight:600;margin-bottom:10px">¿Cuántos invitados se sentarán en PRIMERA FILA?</p>
      <p style="font-size:12px; color:var(--ink-muted); margin-bottom:15px;">Recuerda: Tienes un máximo de 4 huecos delante.</p>
      <input type="range" min="0" max="4" value="4" id="setup-slider" style="width:100%; accent-color:var(--gold);" oninput="updateSetupPreview()" />
      <div style="text-align:center; font-size:40px; font-weight:bold; color:var(--gold); margin:10px 0;" id="setup-front-val">4</div>
      <button class="btn btn-gold btn-full" onclick="confirmSetup()">Guardar Cambios →</button>
    </div>
  </div>

  <div id="s-main" class="screen">
    <div class="my-card">
      <div class="name-row" id="mc-name">—</div>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="label">Invitados</div>
          <div class="value" id="mc-total">0</div>
        </div>
        <div class="stat-item">
          <div class="label">En 1ª Fila</div>
          <div class="value" id="mc-front">0</div>
        </div>
        <div class="stat-item">
          <div class="label">Fila Atrás</div>
          <div class="value" id="mc-back">0</div>
        </div>
      </div>
      <div style="display:flex; gap:10px;">
        <button class="btn btn-outline-white" onclick="openSetup()">✎ Editar Asientos</button>
        <button class="btn btn-outline-white" style="color:var(--red-light); border-color:var(--red-light);" onclick="logout()">✕ Salir</button>
      </div>
    </div>

    <p style="font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-muted); margin:25px 0 10px;">Intercambios Disponibles</p>
    <div id="tab-offers"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// "BASE DE DATOS" TOTALMENTE VACÍA AL INICIO
let ALUMNOS = []; 
let currentUser = null;

function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('l-error').style.display = 'none';
  document.getElementById('r-error').style.display = 'none';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function doRegister() {
  const name = document.getElementById('r-name').value.trim();
  const email = document.getElementById('r-email').value.trim().toLowerCase();
  const totalInv = parseInt(document.getElementById('r-total').value);
  const err = document.getElementById('r-error');

  if(!name || !email || isNaN(totalInv)) {
    err.textContent = "Completa todos los datos correctamente.";
    err.style.display = "block";
    return;
  }
  if(ALUMNOS.find(a => a.email === email)) {
    err.textContent = "Este correo ya está en uso.";
    err.style.display = "block";
    return;
  }

  ALUMNOS.push({
    id: Date.now(),
    nombre: name,
    email: email,
    invitadosTotales: totalInv,
    front: 4 > totalInv ? totalInv : 4, // No puede sentar delante a más de los que trae
    configured: false
  });

  showToast("¡Registrado! Ahora inicia sesión.");
  document.getElementById('r-name').value = '';
  document.getElementById('r-email').value = '';
  goTo('s-login');
}

function doLogin() {
  const email = document.getElementById('l-email').value.trim().toLowerCase();
  const err = document.getElementById('l-error');
  const alumno = ALUMNOS.find(a => a.email === email);

  if(!alumno) {
    err.textContent = "Correo no registrado.";
    err.style.display = "block";
    return;
  }

  currentUser = alumno;
  if(!alumno.configured) goTo('s-setup');
  else { renderMain(); goTo('s-main'); }
}

function openSetup() {
  document.getElementById('setup-slider').max = 4;
  document.getElementById('setup-slider').value = currentUser.front;
  updateSetupPreview();
  goTo('s-setup');
}

function updateSetupPreview() {
  document.getElementById('setup-front-val').textContent = document.getElementById('setup-slider').value;
}

function confirmSetup() {
  const val = parseInt(document.getElementById('setup-slider').value);
  // Validación: No puedes sentar delante a más personas de las que traes en total
  if (val > currentUser.invitadosTotales) {
    showToast("No puedes asignar más asientos que invitados totales.");
    return;
  }
  
  currentUser.front = val;
  currentUser.configured = true;
  showToast("Configuración actualizada.");
  renderMain();
  goTo('s-main');
}

function logout() {
  currentUser = null;
  document.getElementById('l-email').value = '';
  goTo('s-login');
}

function renderMain() {
  document.getElementById('mc-name').textContent = currentUser.nombre;
  document.getElementById('mc-total').textContent = currentUser.invitadosTotales;
  document.getElementById('mc-front').textContent = currentUser.front;
  // Cálculo de invitados atrás
  document.getElementById('mc-back').textContent = currentUser.invitadosTotales - currentUser.front;

  const container = document.getElementById('tab-offers');
  container.innerHTML = '';
  
  // Filtrar otros alumnos que regalan huecos
  const otros = ALUMNOS.filter(a => a.id !== currentUser.id && (4 - a.front) > 0);

  if(otros.length === 0) {
    container.innerHTML = '<div style="text-align:center; padding:40px; color:gray; font-size:13px;">Nadie ofrece huecos libres por ahora.</div>';
    return;
  }

  otros.forEach(a => {
    const card = document.createElement('div');
    card.className = 'offer-card';
    card.innerHTML = `
      <div class="offer-row">
        <div class="avatar" style="background:var(--gold-light); color:var(--gold)">${a.nombre.charAt(0)}</div>
        <div style="flex:1">
          <div style="font-weight:600">${a.nombre}</div>
          <div style="font-size:12px; color:gray">Ofrece ${4 - a.front} huecos en 1ª fila</div>
        </div>
        <button class="btn btn-sm btn-gold" onclick="showToast('Solicitud enviada a ${a.nombre.split(' ')[0]}')">Solicitar</button>
      </div>
    `;
    container.appendChild(card);
  });
}
</script>
</body>
</html>
